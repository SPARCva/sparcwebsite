    // ---------- helpers ----------
    function distanceMiles(lat, lng) {
        var R = 6371000, toRad = Math.PI / 180;
        var dLat = (lat - VENUE.lat) * toRad, dLng = (lng - VENUE.lng) * toRad;
        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(VENUE.lat * toRad) * Math.cos(lat * toRad) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);
        var meters = 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        // 1.15 street-grid factor; report distance, rounded to 0.1 mile
        var mi = Math.round(meters * 1.15 / 1609.34 * 10) / 10;
        return Math.max(0.1, mi).toFixed(1);
    }

            inner = '<path d="M18 42 C18 42 5 25 5 14.5 A13 13 0 0 1 31 14.5 C31 25 18 42 18 42 Z" fill="' + c + '" stroke="#ffffff" stroke-width="3"/>' +
                    '<g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round">' +
                    '<line x1="14" y1="8" x2="14" y2="21"/><line x1="11.5" y1="8" x2="11.5" y2="13"/><line x1="16.5" y1="8" x2="16.5" y2="13"/>' +
                    '<line x1="22.5" y1="8" x2="22.5" y2="21"/><path d="M22.5 8 C25 9.5 25 13 22.5 14.5" fill="none"/>' +
                    '</g>';
        }
        return '<svg class="pin" xmlns="http://www.w3.org/2000/svg" width="36" height="' + sz + '" viewBox="0 0 36 ' + sz + '" aria-hidden="true">' + inner + '</svg>';
    }

    function makeIcon(cat) {
        var sz = CAT_STYLE[cat].size;
        return L.divIcon({
            className: '',
            html: pinSvg(cat),
            iconSize: [36, sz],
            iconAnchor: [18, sz - 2],
            popupAnchor: [0, -(sz - 10)],
            tooltipAnchor: [14, -(sz / 2)]
        });
    }

    // ---------- map ----------
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var map = L.map('map', {
        center: [38.8998, -77.0472],
        zoom: 16,
        zoomAnimation: !reduceMotion,
        fadeAnimation: !reduceMotion,
        markerZoomAnimation: !reduceMotion,
        scrollWheelZoom: false // don't trap page scrolling inside the iframe
    });
    map.getContainer().addEventListener('focus', function () { map.scrollWheelZoom.enable(); }, true);
    map.getContainer().addEventListener('blur', function () { map.scrollWheelZoom.disable(); }, true);

    // CARTO Voyager (retina) renders larger, higher-contrast street names
    // than the default OSM tiles; OSM stays as the fallback.
    var primary = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
    });
    var fellBack = false;
    primary.on('tileerror', function () {
        if (fellBack) { return; }
        fellBack = true;
        map.removeLayer(primary);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        document.getElementById('tileNote').style.display = 'block';
    });
    primary.addTo(map);

    // Extra-large street name labels so key streets are always readable,
    // regardless of tile provider or zoom.
    var STREETS = [
        { name: '21st St NW',          lat: 38.89880, lng: -77.04664, rot: -90 },
        { name: '22nd St NW',          lat: 38.89880, lng: -77.04840, rot: -90 },
        { name: '23rd St NW',          lat: 38.89950, lng: -77.05050, rot: -90 },
        { name: '20th St NW',          lat: 38.89880, lng: -77.04480, rot: -90 },
        { name: 'H St NW',             lat: 38.89952, lng: -77.04390, rot: 0 },
        { name: 'I (Eye) St NW',       lat: 38.90085, lng: -77.04370, rot: 0 },
        { name: 'G St NW',             lat: 38.89808, lng: -77.04390, rot: 0 },
        { name: 'F St NW',             lat: 38.89725, lng: -77.04380, rot: 0 },
        { name: 'E St NW',             lat: 38.89640, lng: -77.04560, rot: 0 },
        { name: 'Pennsylvania Ave NW', lat: 38.90235, lng: -77.04760, rot: -9 },
        { name: 'Virginia Ave NW',     lat: 38.89680, lng: -77.05230, rot: -35 },
        { name: 'New Hampshire Ave NW', lat: 38.89900, lng: -77.05560, rot: 68 }
    ];
    STREETS.forEach(function (st) {
        L.marker([st.lat, st.lng], {
            interactive: false,
            keyboard: false,
            icon: L.divIcon({
                className: '',
                html: '<span class="street-label" aria-hidden="true" style="transform: rotate(' + st.rot + 'deg);">' + st.name + '</span>',
                iconSize: [0, 0]
            })
        }).addTo(map);
    });

    // ---------- markers ----------
    var markers = [];
    LOCATIONS.forEach(function (loc) {
        var miles = distanceMiles(loc.lat, loc.lng);
        var distTxt = loc.cat === 'venue' ? '' : '<p class="popup-dist">About ' + miles + ' miles from the venue</p>';

        var btns = '<a class="popup-btn-primary" href="' + directionsUrl(loc) + '" target="_blank" rel="noopener">Directions</a>';
        (loc.reserve || []).forEach(function (r) {
            btns += '<a href="' + r.href + '" target="_blank" rel="noopener">' + r.label + '</a>';
        });
        if (loc.url) {
            btns += '<a href="' + loc.url + '" target="_blank" rel="noopener">Website</a>';
        }

        var html =
            '<h2>' + loc.name + '</h2>' +
            '<p class="popup-addr">' + loc.address + '</p>' +
            distTxt +
            '<p class="popup-meta">' + loc.desc + '</p>' +
            (loc.ada ? '<p class="popup-ada">♿ ' + loc.ada + '</p>' : '') +
            '<div class="popup-btns">' + btns + '</div>';

        var m = L.marker([loc.lat, loc.lng], {
            icon: makeIcon(loc.cat),
            alt: loc.name + (loc.cat === 'venue' ? ' — summit venue' : ''),
            keyboard: true,
            zIndexOffset: loc.cat === 'venue' ? 1000 : 0
        }).bindPopup(html, { maxWidth: 290 });

        if (loc.label) {
            // Labels stay hidden until the marker is hovered or keyboard-focused,
            // keeping the map uncluttered. Leaflet shows a non-permanent tooltip
            // on mouseover and on focus, and hides it again on mouseout/blur.
            m.bindTooltip(loc.label, {
                permanent: false,
                direction: loc.labelDir || 'right',
                className: 'place-label ' + (loc.labelClass || '')
            });
        }
        m.addTo(map);
        markers.push({ cat: loc.cat, marker: m });
    });

    // ---------- category filter chips ----------
    var chips = document.querySelectorAll('.chip');
    chips.forEach(function (chip) {
        chip.addEventListener('click', function () {
            var cat = chip.getAttribute('data-cat');
            chips.forEach(function (c) { c.setAttribute('aria-pressed', String(c === chip)); });
            markers.forEach(function (entry) {
                var show = cat === 'all' || entry.cat === cat || entry.cat === 'venue';
                if (show) { entry.marker.addTo(map); }
                else { map.removeLayer(entry.marker); }
            });
        });
    });
};
</script>
</body>
</html>
