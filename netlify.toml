# Netlify configuration for SPARC website

[build]
  publish = "."

# Steps Toward Access app — proxied from its own Netlify site.
# Must precede the catch-all pretty-URL rule; force=true so no local
# file can shadow it. The app is built with basePath /accessibility.
[[redirects]]
  from = "/accessibility"
  to = "https://stepstowardaccess.netlify.app/accessibility"
  status = 200
  force = true

[[redirects]]
  from = "/accessibility/*"
  to = "https://stepstowardaccess.netlify.app/accessibility/:splat"
  status = 200
  force = true

# Redirect board-portal.html to board-portal directory
[[redirects]]
  from = "/board-portal.html"
  to = "/board-portal/"
  status = 301

# Enable pretty URLs (removes .html extension)
[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  force = false

# Redirect home.html to root
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Root serves home.html
[[redirects]]
  from = "/"
  to = "/home.html"
  status = 200
